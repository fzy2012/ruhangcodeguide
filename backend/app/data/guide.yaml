        │   │   ├── __init__.py
        │   │   ├── logging.py     # 日志配置
        │   │   ├── database.py    # 数据库工具
        │   │   └── api_client.py  # API客户端
        │   │
        │   └── core/              # 核心模块
        │       ├── __init__.py
        │       ├── config.py      # 配置管理
        │       ├── signals.py     # 信号生成
        │       └── portfolio.py   # 投资组合
        │
        ├── data/                  # 数据目录（Git忽略）
        │   ├── raw/               # 原始数据
        │   ├── processed/         # 处理后数据
        │   ├── external/          # 外部数据
        │   └── cache/             # 缓存
        │
        ├── models/                # 模型文件（Git忽略）
        │   ├── checkpoints/       # 检查点
        │   └── exports/           # 导出模型
        │
        └── logs/                  # 日志（Git忽略）
