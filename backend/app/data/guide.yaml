        ## 📝 代码规范与质量要求

        ### Shell 编码规范

        ```yaml
        requirements:
          shebang: "#!/bin/bash"

          strict_mode:
            - set -e: 遇到错误立即退出
            - set -u: 使用未定义变量报错
            - set -o pipefail: 管道中任何命令失败则失败
            - 写法: set -euo pipefail

          constants:
            - 全大写: RED, GREEN, CYAN
            - readonly 修饰: readonly RED='\033[0;31m'

          variables:
            - 局部变量: local var_name
            - 全局变量: GLOBAL_VAR_NAME
            - 引用: "${var_name}" (总是加引号)

          functions:
            - 命名: snake_case
            - 声明: function_name() { ... }
            - 返回值: return 0/1 或 echo result

          comments:
            - 每个函数前注释功能
            - 复杂逻辑添加行内注释
            - 分隔符: # ===== Section =====
        ```

        ### 错误处理

        ```yaml
        requirements:
          command_check:
            - if ! command_exists python3; then
            - command -v cmd &> /dev/null

          file_check:
            - if [ -f "$file" ]; then
            - if [ -d "$dir" ]; then

          error_exit:
            - log_error "Error message"
            - exit 1 或 return 1

          trap_signals:
            - trap cleanup_function EXIT
            - trap handle_sigint SIGINT
            - 确保资源清理
        ```

        ### 性能优化

        ```yaml
        requirements:
          avoid_subshells:
            - 优先使用 bash 内建命令
            - 避免不必要的 | 管道

          cache_results:
            - 重复使用的值存储到变量
            - 避免重复调用外部命令

          parallel_execution:
            - 独立任务使用 & 并行
            - 使用 wait 等待完成
        ```

