        ### 数据结构
        - [数据结构名称]
          - 用途：[用来存储什么]
          - 字段：[包含哪些字段]

        ### 算法逻辑
        - [算法名称]
          - 用途：[解决什么问题]
          - 输入：[接收什么参数]
          - 输出：[返回什么结果]
          - 复杂度：[时间/空间复杂度]

        ### 接口定义
        - [接口路径/方法名]
          - 类型：[API/函数/类方法]
