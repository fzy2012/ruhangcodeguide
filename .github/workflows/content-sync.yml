name: Content Sync

on:
  # 每天北京时间 9:00（UTC+8 = UTC 1:00）自动运行
  schedule:
    - cron: "0 1 * * *"
  # 也可以在 GitHub Actions 页面手动触发
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 需要写权限才能 commit & push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch upstream content
        env:
          # GITHUB_TOKEN 由 Actions 自动提供，用于提高 API 速率限制（60→5000 次/小时）
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-upstream.mjs

      - name: Sync YAML → TypeScript
        run: pnpm sync

      - name: Commit and push if content changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/app/data/ lib/
          if git diff --cached --quiet; then
            echo "No content changes. Skipping commit."
          else
            git commit -m "chore: auto-sync content from upstream [skip ci]"
            git push
          fi
