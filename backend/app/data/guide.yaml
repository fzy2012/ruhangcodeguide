        ## 🔧 服务管理功能

        ### 核心操作

        ```yaml
        requirements:
          start_service:
            process:
              - 检查服务是否已运行
              - 已运行则提示并退出
              - 启动后台进程 (nohup ... &)
              - 保存 PID 到文件
              - 验证启动成功
              - 输出日志路径

            error_handling:
              - 启动失败时清理 PID 文件
              - 记录错误日志
              - 返回非零退出码

          stop_service:
            process:
              - 读取 PID 文件
              - 检查进程是否存在
              - 发送 SIGTERM 信号
              - 等待进程退出 (最多 30 秒)
              - 超时则发送 SIGKILL
              - 删除 PID 文件

            error_handling:
              - PID 文件不存在时提示
              - 进程已死但 PID 存在时清理

          restart_service:
            process:
              - 调用 stop_service
              - 等待 1-2 秒
              - 调用 start_service

          status_check:
            display:
              - 服务状态: Running/Stopped
              - PID (如果运行)
              - CPU 使用率
              - 内存使用率
              - 运行时长
              - 日志文件大小
              - 最后一次启动时间
        ```

        ### PID 文件管理

        ```yaml
        requirements:
          location: data/ 或 pids/
          naming: service_name.pid
          content: 单行纯数字 (进程 ID)

          operations:
            create:
              - echo $! > "$PID_FILE"
              - 立即刷新到磁盘

            read:
              - pid=$(cat "$PID_FILE")
              - 验证是否为数字

            check:
              - kill -0 "$pid" 2>/dev/null
              - 返回 0 表示进程存活

            cleanup:
              - rm -f "$PID_FILE"
              - 记录清理日志
        ```

