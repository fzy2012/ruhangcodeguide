name: Content Sync

on:
  # 每天北京时间 9:00（UTC+8 = UTC 1:00）自动运行
  schedule:
    - cron: "0 1 * * *"
  # 也可以在 GitHub Actions 页面手动触发
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 需要写权限才能 commit & push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ──────────────────────────────────────────────────────────────
      # 在这里添加从外部数据源拉取内容的步骤。
      # 示例：从 Notion 数据库同步
      #
      # - name: Fetch from Notion
      #   env:
      #     NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      #     NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      #   run: node scripts/fetch-notion.mjs
      #
      # 示例：从 Google Sheets 同步
      #
      # - name: Fetch from Google Sheets
      #   env:
      #     GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
      #     GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
      #   run: node scripts/fetch-sheets.mjs
      # ──────────────────────────────────────────────────────────────

      - name: Sync YAML → TypeScript
        run: pnpm sync

      - name: Commit and push if content changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/app/data/ lib/
          if git diff --cached --quiet; then
            echo "No content changes. Skipping commit."
          else
            git commit -m "chore: auto-sync content [skip ci]"
            git push
          fi
