        - [示例代码参考]
        ```

        ---

        ## 阶段 3：计划审查与确认

        ### 3.1 生成计划摘要
        生成所有计划文件后，创建一份摘要报告：

        ```markdown
        # 计划生成完成报告

        ## 生成的文件
        - plan_01_总体计划.md (1级)
        - plan_02_[模块名].md (2级) - 预估XX小时
          - plan_03_[子任务].md (3级) - 预估XX分钟
          - plan_04_[子任务].md (3级) - 预估XX分钟
        - plan_05_[模块名].md (2级) - 预估XX小时
          - plan_06_[子任务].md (3级) - 预估XX分钟

        ## 统计信息
        - 总文件数：XX
        - 2级任务（模块）：XX
        - 3级任务（具体任务）：XX
        - 预估总耗时：XX小时

        ## 可视化产出
        - 系统逻辑图：`plan_01_总体计划.md`
        - 模块流程图：`plan_0X_[模块名].md`
        - 任务流程/风险图：`plan_0X_[子任务].md`
        - 项目时间线：`plan_01_总体计划.md`
        - 用户看板示意：`plan_0X_用户看板.md`（若存在）

        ## 下一步
        1. 审查计划文档
        2. 根据需要调整
        3. 确认后可使用 /plan-execute 开始执行
        ```

        ### 3.2 等待用户反馈
        询问用户：
        - 计划是否符合预期？
        - 是否需要调整？
        - 是否需要更详细或更简略？
        - 可视化视图是否清晰、是否需要额外的图表？

        ---

        ## 🎯 关键原则

        ### ✅ 必须遵守
        1. **只生成计划**：不编写任何实际代码
        2. **抽象描述**：使用占位符和抽象描述，不使用具体示例
        3. **完整性**：确保计划文档信息完整，可执行
        4. **层级清晰**：严格遵循1-2-3级层级结构
        5. **连续编号**：文件编号从01开始连续递增
        6. **详略得当**：1级概要，2级适中，3级详细
        7. **多维可视化**：每份计划文档需附带与其层级匹配的图表/表格，并保持与编号、名称一致

        ### ❌ 禁止行为
        1. 不要编写实际代码
        2. 不要创建代码文件
        3. 不要使用具体的文件名示例（如 LoginForm.jsx）
        4. 不要使用具体的函数名示例（如 authenticateUser()）
        5. 只生成 plan_XX.md 文件

        ---

        ## 🚀 开始信号

        当用户发送需求后，你的第一句话应该是：

        "我将帮您生成完整的项目计划文档。首先让我深入了解您的需求：

        **1. 项目目标**：这个项目的核心功能是什么？要解决什么问题？

        **2. 功能模块**：您认为可以分为哪几个主要模块？

        **3. 技术栈**：计划使用什么技术？有特定要求吗？

        **4. 可视化偏好**：希望我在计划中提供哪些图表或视图？

        请详细回答这些问题，我会继续深入了解。"

        ---

        ## 结束语

        当所有计划文档生成后，输出：

        "✅ **项目计划文档生成完成！**

        📊 **统计信息**：
        - 总计划文件：XX 个
        - 模块数量：XX 个
        - 具体任务：XX 个
        - 预估总耗时：XX 小时

        📁 **文件位置**：`plan/` 目录

        🔍 **下一步建议**：
        1. 审查 `plan_01_总体计划.md` 了解整体规划
        2. 检查各个 `plan_XX.md` 文件的详细内容
        3. 如需调整，请告诉我具体修改点
        4. 确认无误后，可使用 `/plan-execute` 开始执行实施

        有任何需要调整的地方吗？"
    - id: sh控制面板生成
      title: 生产级 Shell 控制面板生成规格说明
      content: |-
        # 生产级 Shell 控制面板生成规格说明

        > **用途**: 本文档作为提示词模板，用于指导 AI 生成符合生产标准的 Shell 交互式控制面板。
        >
        > **使用方法**: 将本文档内容作为提示词提供给 AI，AI 将基于此规格生成完整的控制面板脚本。

        ---

        ## 📋 项目需求概述

        请生成一个生产级的 Shell 交互式控制面板脚本，用于管理和控制复杂的软件系统。该控制面板必须满足以下要求：

        ### 核心目标
        1. **自动化程度高** - 首次运行自动配置所有依赖和环境，后续运行智能检查、按需安装，而不是每次都安装，只有缺失或者没有安装的时候才安装
        2. **生产就绪** - 可直接用于生产环境，无需手动干预
        3. **双模式运行** - 支持交互式菜单和命令行直接调用
        4. **高可维护性** - 模块化设计,易于扩展和维护
        5. **自修复能力** - 自动检测并修复常见问题

        ### 技术要求
        - **语言**: Bash Shell (兼容 bash 4.0+)
        - **依赖**: 自动检测和安装（Python3, pip, curl, git）
        - **平台**: Ubuntu/Debian, CentOS/RHEL, macOS
        - **文件数量**: 单文件实现
        - **执行模式**: 幂等设计，可重复执行

        ---

        ## 🏗️ 架构设计：5 层核心功能

        ### Layer 1: 环境检测与自动安装模块

        **功能需求**:

        ```yaml
        requirements:
          os_detection:
            - 自动识别操作系统类型 (Ubuntu/Debian/CentOS/RHEL/macOS)
            - 识别系统版本号
            - 识别包管理器 (apt-get/yum/dnf/brew)

          dependency_check:
            - 检查必需依赖: python3, pip3, curl
            - 检查推荐依赖: git
            - 返回缺失依赖列表

          auto_install:
            - 提示用户确认安装（交互模式）
            - 静默自动安装（--force 模式）
            - 调用对应包管理器安装
            - 安装失败时提供明确错误信息

          venv_management:
            - 检测虚拟环境是否存在
            - 不存在则创建 .venv/
            - 自动激活虚拟环境
            - 检查 pip 版本，仅在过旧时升级
            - 检查 requirements.txt 依赖是否已安装
            - 仅在缺失或版本不匹配时安装依赖
            - 所有检查通过则跳过安装，直接进入下一步
        ```

        **关键函数**:
        ```bash
        detect_environment()         # 检测 OS 和包管理器
        command_exists()             # 检查命令是否存在
        check_system_dependencies()  # 检查系统依赖
        auto_install_dependency()    # 自动安装缺失依赖
        setup_venv()                 # 配置 Python 虚拟环境
        check_venv_exists()          # 检查虚拟环境是否存在
        check_pip_requirements()     # 检查 requirements.txt 依赖是否满足
        verify_dependencies()        # 验证所有依赖完整性，仅缺失时触发安装
        ```

        **实现要点**:
        - 使用 `/etc/os-release` 检测 Linux 发行版
        - 使用 `uname` 检测 macOS
        - **智能检查优先**：每次启动前先验证环境和依赖，仅在检测到缺失或版本不符时才执行安装，每次启动前先验证环境和依赖，仅在检测到缺失或版本不符时才执行安装，每次启动前先验证环境和依赖，仅在检测到缺失或版本不符时才执行安装
        - **幂等性保证**：重复运行不会重复安装已存在的依赖，避免不必要的时间消耗
        - 优雅降级：无法安装时给出手动安装指令
        - 支持离线环境检测（跳过自动安装）

        ---

        ### Layer 2: 初始化与自修复机制

        **功能需求**:

        ```yaml
        requirements:
          directory_management:
            - 检查必需目录: data/, logs/, modules/, pids/
            - 缺失时自动创建
            - 设置正确的权限 (755)

          pid_cleanup:
            - 扫描所有 .pid 文件
            - 检查进程是否存活 (kill -0)
            - 清理僵尸 PID 文件
            - 记录清理日志

          permission_check:
            - 验证关键目录的写权限
            - 验证脚本自身的执行权限
            - 权限不足时给出明确提示

          config_validation:
            - 检查 .env 文件存在性
            - 验证必需的环境变量
            - 缺失时从模板创建或提示用户

          safe_mode:
            - 初始化失败时进入安全模式
            - 只启动基础功能
            - 提供修复建议
        ```

        **关键函数**:
        ```bash
        init_system()           # 系统初始化总入口
        init_directories()      # 创建目录结构
        clean_stale_pids()      # 清理过期 PID
        check_permissions()     # 权限检查
        validate_config()       # 配置验证
        enter_safe_mode()       # 安全模式
        ```

        **实现要点**:
        - 使用 `mkdir -p` 确保父目录存在
        - 使用 `kill -0 $pid` 检查进程存活
        - 所有操作都要有错误处理
        - 记录所有自动修复的操作

        ---

        ### Layer 3: 参数化启动与非交互模式

        **功能需求**:

        ```yaml
        requirements:
          command_line_args:
            options:
              - name: --silent / -s
                description: 静默模式，无交互提示
                effect: SILENT=1

              - name: --force / -f
                description: 强制执行，自动确认
                effect: FORCE=1

              - name: --no-banner
                description: 不显示 Banner
                effect: NO_BANNER=1

              - name: --debug / -d
                description: 显示调试信息
                effect: DEBUG=1

              - name: --help / -h
                description: 显示帮助信息
                effect: print_usage && exit 0

            commands:
              - start: 启动服务
              - stop: 停止服务
              - restart: 重启服务
              - status: 显示状态
              - logs: 查看日志
              - diagnose: 系统诊断

          execution_modes:
            interactive:
              - 显示彩色菜单
              - 等待用户输入
              - 操作后按回车继续

            non_interactive:
              - 直接执行命令
              - 最小化输出
              - 返回明确的退出码 (0=成功, 1=失败)

          exit_codes:
            - 0: 成功
            - 1: 一般错误
            - 2: 参数错误
            - 3: 依赖缺失
            - 4: 权限不足
        ```

        **关键函数**:
        ```bash
        parse_arguments()       # 解析命令行参数
        print_usage()           # 显示帮助信息
        execute_command()       # 执行非交互命令
        interactive_mode()      # 交互式菜单
        ```

        **实现要点**:
        - 使用 `getopts` 或手动 `while [[ $# -gt 0 ]]` 解析参数
        - 参数和命令分离处理
        - 非交互模式禁用所有 `read` 操作
        - 明确的退出码便于 CI/CD 判断

        **CI/CD 集成示例**:
        ```bash
        # GitHub Actions
        ./control.sh start --silent --force || exit 1

        # Crontab
        0 2 * * * cd /path && ./control.sh restart --silent

        # Systemd
        ExecStart=/path/control.sh start --silent
        ```

        ---

        ### Layer 4: 模块化插件系统

        **功能需求**:

        ```yaml
        requirements:
          plugin_structure:
            directory: modules/
            naming: *.sh
            loading: 自动扫描并 source

          plugin_interface:
            initialization:
              - 函数名: ${MODULE_NAME}_init()
              - 调用时机: 模块加载后立即执行
              - 用途: 注册命令、验证依赖

            cleanup:
              - 函数名: ${MODULE_NAME}_cleanup()
              - 调用时机: 脚本退出前
              - 用途: 清理资源、保存状态

          plugin_registry:
            - 维护已加载模块列表: LOADED_MODULES
            - 支持模块查询: list_modules()
            - 支持模块启用/禁用

          plugin_dependencies:
            - 模块可声明依赖: REQUIRES=("curl" "jq")
            - 加载前检查依赖
            - 依赖缺失时跳过并警告
        ```

        **关键函数**:
        ```bash
        load_modules()          # 扫描并加载模块
        register_module()       # 注册模块信息
        check_module_deps()     # 检查模块依赖
        list_modules()          # 列出已加载模块
        ```

        **模块模板**:
        ```bash
        #!/bin/bash
        # modules/example.sh

        MODULE_NAME="example"
        REQUIRES=("curl")

        example_init() {
            log_info "Example module loaded"
            register_command "backup" "backup_database"
        }

        backup_database() {
            log_info "Backing up database..."
            # 实现逻辑
        }

        example_init
        ```

        **实现要点**:
        - 使用 `for module in modules/*.sh` 扫描
        - 使用 `source $module` 加载
        - 加载失败不影响主程序
        - 支持模块间通信（通过全局变量或函数）

        ---

        ### Layer 5: 监控、日志与诊断系统

        **功能需求**:

        ```yaml
        requirements:
          logging_system:
            levels:
              - INFO: 一般信息（青色）
              - SUCCESS: 成功操作（绿色）
              - WARN: 警告信息（黄色）
              - ERROR: 错误信息（红色）
              - DEBUG: 调试信息（蓝色，需开启 --debug）

            output:
              console:
                - 彩色输出（交互模式）
                - 纯文本（非交互模式）
                - 可通过 --silent 禁用

              file:
                - 路径: logs/control.log
                - 格式: "时间戳 [级别] 消息"
                - 自动追加，不覆盖

            rotation:
              - 检测日志大小
              - 超过阈值时轮转 (默认 10MB)
              - 保留格式: logfile.log.1, logfile.log.2
              - 可配置保留数量

          process_monitoring:
            metrics:
              - PID: 进程 ID
              - CPU: CPU 使用率 (%)
              - Memory: 内存使用率 (%)
              - Uptime: 运行时长

            collection:
              - 使用 ps 命令采集
              - 格式化输出
              - 支持多进程监控

          system_diagnostics:
            collect_info:
              - 操作系统信息
              - Python 版本
              - 磁盘使用情况
              - 目录状态
              - 最近日志 (tail -n 10)
              - 进程状态

            health_check:
              - 检查服务是否运行
              - 检查关键文件存在性
              - 检查磁盘空间
              - 检查内存使用
              - 返回健康状态和问题列表
        ```

        **关键函数**:
        ```bash
        # 日志函数
        log_info()              # 信息日志
        log_success()           # 成功日志
        log_warn()              # 警告日志
        log_error()             # 错误日志
        log_debug()             # 调试日志
        log_message()           # 底层日志函数

        # 日志管理
        rotate_logs()           # 日志轮转
        clean_old_logs()        # 清理旧日志

        # 进程监控
        get_process_info()      # 获取进程信息
        monitor_process()       # 持续监控进程
        check_process_health()  # 健康检查

        # 系统诊断
        diagnose_system()       # 完整诊断
        collect_system_info()   # 收集系统信息
        generate_diagnostic_report() # 生成诊断报告
        ```

        **实现要点**:
        - ANSI 颜色码定义为常量
        - 使用 `tee -a` 同时输出到控制台和文件
        - `ps -p $pid -o %cpu=,%mem=,etime=` 获取进程信息
        - 诊断信息输出为结构化格式

        ---

        ## 🎨 用户界面设计

        ### Banner 设计

        ```yaml
        requirements:
          ascii_art:
            - 使用 ASCII 字符绘制
            - 宽度不超过 80 字符
            - 包含项目名称
            - 可选版本号

          color_scheme:
            - 主色调: 青色 (CYAN)
            - 强调色: 绿色 (GREEN)
            - 警告色: 黄色 (YELLOW)
            - 错误色: 红色 (RED)

          toggle:
            - 支持 --no-banner 禁用
            - 非交互模式自动禁用
        ```

        **示例**:
        ```
        ╔══════════════════════════════════════════════╗
        ║      Enhanced Control Panel v2.0            ║
        ╚══════════════════════════════════════════════╝
        ```

        ### 菜单设计

        ```yaml
        requirements:
          layout:
            - 清晰的分隔线
            - 数字编号选项
            - 彩色标识（绿色数字，白色文字）
            - 退出选项用红色

          structure:
            main_menu:
              - 标题: "Main Menu" 或中文
              - 功能选项: 1-9
              - 退出选项: 0

            sub_menu:
              - 返回主菜单: 0
              - 面包屑导航: 显示当前位置

          interaction:
            - read -p "选择: " choice
            - 无效输入提示
            - 操作完成后 "按回车继续..."
        ```

