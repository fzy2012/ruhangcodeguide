- id: introduction
  title: 什么是 AI 编程
  emoji: "🤖"
  order: 1
  summary: 了解 AI 编程和 Vibe Coding 的概念，以及它们如何改变我们编写代码的方式。
  content: |-
    ## 什么是 AI 编程？

    AI 编程（也称为 Vibe Coding）是一种利用人工智能工具来辅助或主导软件开发的新型编程方式。与传统编程不同，AI 编程让开发者可以用自然语言描述需求，由 AI 生成对应的代码。

    ## Vibe Coding 的定义

    "Vibe Coding" 这一概念由 OpenAI 联合创始人 Andrej Karpathy 于 2025 年提出。它描述的是一种沉浸式的 AI 辅助编程体验：开发者专注于描述想要实现的功能和"感觉"，而不是手写每一行代码。

    > 你更像是一个架构师和产品经理，告诉 AI 你想要什么，AI 帮你实现它。

    ## AI 编程如何改变开发方式？

    - **降低入门门槛**：非程序员也能借助 AI 构建功能完整的应用
    - **提升开发效率**：重复性代码、样板代码由 AI 自动生成
    - **加速原型验证**：从想法到可运行的演示版本只需几小时
    - **专注核心逻辑**：开发者把精力放在业务价值和架构决策上

    ## 主流 AI 编程工具

    目前最受欢迎的 AI 编程工具包括 **Claude Code**、**Cursor**、**GitHub Copilot**、**Windsurf** 等。这些工具各有侧重，但都能大幅提升开发效率。

    ## 谁适合学习 AI 编程？

    - 有编程基础、想提升效率的开发者
    - 想转型做独立开发者的产品经理、设计师
    - 想快速验证创业想法的创业者
    - 对技术感兴趣、想入行的非技术人员
  key_points:
    - AI 编程通过自然语言描述需求，降低编码门槛
    - Vibe Coding 让开发者专注架构和产品，而非语法细节
    - 主流工具包括 Claude Code、Cursor、GitHub Copilot 等
  subsections: []

- id: getting-started
  title: 如何开始
  emoji: "🚀"
  order: 2
  summary: 根据你的技术背景，选择最适合的入门工具和学习路径。
  content: |-
    ## 选择适合你的工具

    不同背景的人适合不同的入门路径。以下是根据技术背景的推荐：

    ### 零基础入门

    如果你没有编程基础，推荐从 **Claude.ai** 或 **ChatGPT** 开始，直接用对话方式生成简单的网页或脚本，感受 AI 编程的魅力。

    ### 有一定基础

    如果你了解基本的 HTML/CSS/JavaScript，推荐使用 **Cursor** 或 **Windsurf**。这些是 AI 增强的代码编辑器，能在你现有的代码基础上提供智能补全和生成。

    ### 进阶开发者

    如果你是有经验的开发者，推荐使用 **Claude Code**（命令行工具）或 **GitHub Copilot**，将 AI 深度集成到你的现有工作流中。

    ## 环境搭建步骤

    1. **安装 Node.js**：大多数 Web 项目的基础运行环境
    2. **选择编辑器**：推荐 Cursor（内置 AI）或 VS Code + Copilot 插件
    3. **注册 AI 服务**：Claude、ChatGPT 或 GitHub Copilot 账号
    4. **创建第一个项目**：用 AI 生成一个简单的待办事项应用

    ## 你的第一个 AI 编程项目

    一个好的起点是构建一个**个人主页**或**简单工具**。用以下提示词开始：

    ```
    帮我创建一个简单的个人主页，包含：
    - 我的名字和简介
    - 技能列表
    - 联系方式
    使用 HTML、CSS 和少量 JavaScript，风格现代简洁。
    ```

    ## 学习资源推荐

    - 本站的完整指南（你正在阅读！）
    - Claude 官方文档：https://docs.anthropic.com
    - Cursor 官网：https://cursor.sh
    - GitHub 上的开源 AI 编程项目
  key_points:
    - 根据技术背景选择合适的工具：零基础用 Claude.ai，有基础用 Cursor
    - 从简单项目开始，如个人主页或待办事项应用
    - 环境搭建：Node.js + 支持 AI 的编辑器 + AI 服务账号
  subsections: []

- id: prompting
  title: 提示词技巧
  emoji: "💬"
  order: 3
  summary: 学习如何编写高质量的提示词，让 AI 更好地理解你的需求。
  content: |-
    ## 为什么提示词很重要？

    提示词（Prompt）是你与 AI 沟通的语言。好的提示词能让 AI 生成高质量、符合需求的代码；模糊的提示词则会产生需要大量修改的结果。

    ## 提示词的基本结构

    一个好的编程提示词通常包含以下要素：

    - **上下文**：当前项目的技术栈和已有内容
    - **目标**：你想实现什么功能
    - **约束**：技术限制、样式要求、性能要求等
    - **示例**（可选）：期望的输入输出格式

    ## 常用提示词模板

    ### 创建新功能

    ```
    我有一个使用 [技术栈] 的项目。
    请帮我实现 [具体功能]。
    要求：
    - [要求1]
    - [要求2]
    现有代码结构：[简要描述]
    ```

    ### 修复 Bug

    ```
    以下代码出现了 [错误描述]：
    [粘贴代码]
    错误信息：[错误日志]
    请找出原因并修复。
    ```

    ### 代码优化

    ```
    请优化以下代码的 [性能/可读性/安全性]：
    [粘贴代码]
    优化重点：[具体说明]
    ```

    ## 提示词进阶技巧

    - **分步骤**：复杂任务拆分为多个小步骤逐一完成
    - **提供示例**：给出输入输出例子，AI 能更准确地理解需求
    - **明确技术栈**：指定使用的语言、框架和版本
    - **迭代优化**：基于 AI 的回复继续追问和调整
    - **角色设定**：让 AI 扮演特定角色，如"你是一个 React 专家"
  key_points:
    - 好的提示词包含上下文、目标、约束三要素
    - 复杂任务要分步骤，避免一次性要求过多
    - 迭代追问比一次完美提问更有效
  subsections: []

- id: project-setup
  title: 项目架构
  emoji: "🏗️"
  order: 4
  summary: 学习如何组织你的 AI 编程项目，包括前后端分离、代码规范等。
  content: |-
    ## AI 编程项目的基本架构

    在开始用 AI 写代码之前，了解基本的项目结构能让你事半功倍。一个组织良好的项目让 AI 更容易理解上下文，生成更好的代码。

    ## 推荐的技术栈

    ### 全栈 Web 应用（推荐新手）

    - **前端**：Next.js（React 框架，支持服务端渲染）
    - **样式**：Tailwind CSS（实用优先的 CSS 框架）
    - **后端**：Next.js API Routes 或 FastAPI（Python）
    - **数据库**：PostgreSQL + Prisma ORM 或 Supabase
    - **部署**：Vercel（前端）+ Railway/Render（后端）

    ### 快速原型（最简单）

    - HTML + CSS + JavaScript（纯静态）
    - 或 Vite + React（单页应用）

    ## 项目目录结构

    ```
    my-project/
    ├── app/              # 页面和路由
    │   ├── page.tsx      # 首页
    │   └── api/          # API 接口
    ├── components/       # 可复用组件
    ├── lib/              # 工具函数
    ├── public/           # 静态资源
    └── README.md         # 项目说明
    ```

    ## 与 AI 协作的最佳实践

    - **保持 README 更新**：让 AI 了解项目背景和技术决策
    - **写清晰的注释**：帮助 AI 理解代码意图
    - **拆分组件**：每个文件只做一件事，AI 修改更精准
    - **使用 TypeScript**：类型定义帮助 AI 生成更准确的代码
    - **版本控制**：用 Git 保存每次成功的版本，便于回滚

    ## CLAUDE.md 文件

    使用 Claude Code 时，在项目根目录创建 `CLAUDE.md` 文件，写入项目说明、规范和常用命令。Claude 会自动读取这个文件作为上下文。
  key_points:
    - 推荐新手使用 Next.js + Tailwind CSS + Vercel 技术栈
    - 良好的目录结构让 AI 更容易理解和修改代码
    - CLAUDE.md 文件帮助 Claude Code 理解项目上下文
  subsections: []

- id: debugging
  title: 调试与问题解决
  emoji: "🐛"
  order: 5
  summary: 当 AI 生成的代码出现问题时，如何有效地调试和修复。
  content: |-
    ## AI 生成代码的常见问题

    AI 生成的代码并不总是完美的。了解常见问题类型，能帮你更快地定位和解决问题。

    ## 常见问题类型

    ### 1. 逻辑错误

    AI 理解了需求但实现方式有偏差。
    **解决方法**：提供更具体的例子说明期望行为。

    ### 2. 依赖冲突

    使用了不兼容的库版本。
    **解决方法**：把错误信息直接告诉 AI，让它修复依赖版本。

    ### 3. 环境问题

    代码在 AI 的"理解"中能运行，但实际环境不同。
    **解决方法**：告诉 AI 你的操作系统、Node.js 版本等环境信息。

    ### 4. 上下文丢失

    AI 忘记了之前的代码结构，生成了不兼容的新代码。
    **解决方法**：重新提供相关文件的代码内容给 AI。

    ## 高效调试流程

    1. **复现问题**：确保问题可以稳定复现
    2. **收集信息**：错误信息、控制台日志、网络请求
    3. **提供给 AI**：把完整错误信息和相关代码告诉 AI
    4. **验证修复**：测试 AI 的修复方案是否解决问题
    5. **理解原因**：让 AI 解释为什么这样修复，加深理解

    ## 向 AI 描述 Bug 的技巧

    ```
    我遇到了以下问题：
    [描述期望行为]
    [描述实际行为]

    错误信息：
    [粘贴完整错误日志]

    相关代码：
    [粘贴出问题的代码]

    环境信息：
    - Node.js 版本：xx
    - 操作系统：xx
    ```

    ## 当 AI 无法解决时

    - 尝试换一种方式描述问题
    - 把问题拆小，逐步排查
    - 搜索 Stack Overflow 或 GitHub Issues
    - 查阅官方文档
    - 重新开始，用不同的技术方案实现
  key_points:
    - 把完整的错误信息和相关代码提供给 AI，而不只是描述症状
    - 让 AI 解释修复原因，帮助你真正理解问题
    - 当 AI 多次失败时，考虑换一种技术方案
  subsections: []

- id: advanced
  title: 进阶技巧
  emoji: "⚡"
  order: 6
  summary: 深入了解 MCP、A2A 等新技术，以及如何创建自己的 AI 编程代理。
  content: |-
    ## 进入 AI 编程的高级阶段

    掌握了基础之后，可以探索更强大的 AI 编程技术，包括 MCP 协议、多智能体协作和自定义 AI 代理。

    ## MCP（Model Context Protocol）

    MCP 是 Anthropic 推出的开放协议，让 AI 模型能够安全地连接外部工具和数据源。

    **MCP 能做什么？**

    - 让 AI 直接读写文件系统
    - 连接数据库并执行查询
    - 调用外部 API（GitHub、Slack、Google Drive 等）
    - 控制浏览器进行自动化操作

    **如何使用 MCP？**

    在 Claude Code 的设置中配置 MCP 服务器，即可让 Claude 获得额外能力。

    ## A2A（Agent-to-Agent）协作

    A2A 是 Google 推出的智能体间通信协议，允许不同的 AI 代理相互协作完成复杂任务。

    **典型场景：**

    - 一个代理负责需求分析，另一个负责代码生成，第三个负责测试
    - 多个专业代理并行工作，最终合并结果

    ## 自定义 AI 代理（Agent）

    使用 Claude API 或 Agent SDK，你可以创建自己的 AI 代理：

    ```python
    import anthropic

    client = anthropic.Anthropic()

    response = client.messages.create(
        model="claude-opus-4-6",
        max_tokens=1024,
        messages=[
            {"role": "user", "content": "帮我分析这份代码并提出改进建议"}
        ]
    )
    print(response.content[0].text)
    ```

    ## 最佳实践

    - **工具调用（Tool Use）**：给 AI 代理定义工具，让它能执行具体操作
    - **流式输出（Streaming）**：对于长任务，使用流式输出提升用户体验
    - **提示词缓存（Prompt Caching）**：减少重复内容的 API 调用成本
    - **上下文管理**：合理管理对话历史，避免超出上下文限制

    ## 推荐学习路径

    1. 深入学习一个 AI 框架（如 LangChain、LlamaIndex）
    2. 实践 MCP 服务器的开发
    3. 尝试构建自己的 AI 代理应用
    4. 关注 Anthropic、OpenAI 的最新发布
  key_points:
    - MCP 协议让 AI 能安全访问文件、数据库和外部 API
    - A2A 协议支持多个 AI 代理协作完成复杂任务
    - 使用 Claude API 可以构建自定义的 AI 代理应用
  subsections: []
