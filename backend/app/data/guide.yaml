        detect_environment() { ... }
        check_system_dependencies() { ... }
        check_venv_exists() { ... }           # 检查虚拟环境是否存在
        verify_dependencies() { ... }         # 验证依赖完整性
        smart_install_if_needed() { ... }     # 智能安装：仅在检查失败时安装
        # ... 其他函数

        # ==============================================================================
        # LAYER 2: 初始化与自修复
        # ==============================================================================

        init_directories() { ... }
        clean_stale_pids() { ... }
        # ... 其他函数

        # ==============================================================================
        # LAYER 3: 参数化启动
        # ==============================================================================

        parse_arguments() { ... }
        print_usage() { ... }
        # ... 其他函数

        # ==============================================================================
        # LAYER 4: 模块化插件系统
        # ==============================================================================

        load_modules() { ... }
        # ... 其他函数

        # ==============================================================================
        # LAYER 5: 监控与日志
        # ==============================================================================

        log_info() { ... }
        get_process_info() { ... }
        # ... 其他函数

        # ==============================================================================
        # 服务管理功能（用户定制区）
        # ==============================================================================

        start_service() {
            log_info "Starting service..."
            # 👇 在这里添加你的启动逻辑
        }

        stop_service() {
            log_info "Stopping service..."
            # 👇 在这里添加你的停止逻辑
        }

        # ==============================================================================
        # 交互式菜单
        # ==============================================================================

        print_banner() { ... }
        show_menu() { ... }
        interactive_mode() { ... }

        # ==============================================================================
