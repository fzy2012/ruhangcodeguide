    - id: 通用项目架构模板
      title: 通用项目架构模板
      content: |-
        # 通用项目架构模板

        ## 1️⃣ Python Web/API 项目标准结构

        ```
        项目名称/
        ├── README.md                 # 项目说明文档
        ├── LICENSE                   # 开源协议
        ├── requirements.txt          # 依赖管理（pip）
        ├── pyproject.toml           # 现代Python项目配置（推荐）
        ├── setup.py                 # 包安装脚本（如果做成库）
        ├── .gitignore              # Git忽略文件
        ├── .env                    # 环境变量（不提交到Git）
        ├── .env.example            # 环境变量示例
        ├── CLAUDE.md              # claude持久上下文
        ├── AGENTS.md              # codex持久上下文
        ├── Sublime-Text.txt                   # 放需求和注意事项，给自己看的，和cli的会话恢复指令^_^
        │
        ├── docs/                   # 文档目录
        │   ├── api.md             # API文档
        │   ├── development.md     # 开发指南
        │   └── architecture.md    # 架构说明
        │
        ├── scripts/               # 脚本工具
        │   ├── deploy.sh          # 部署脚本
        │   ├── backup.sh          # 备份脚本
        │   └── init_db.sh         # 数据库初始化
        │
        ├── tests/                 # 测试代码
        │   ├── __init__.py
        │   ├── conftest.py        # pytest配置
        │   ├── unit/              # 单元测试
        │   ├── integration/       # 集成测试
        │   └── test_config.py     # 配置测试
        │
        ├── src/                   # 源代码（推荐方式）
        │   ├── __init__.py
        │   ├── main.py           # 程序入口
        │   ├── app.py            # Flask/FastAPI应用
        │   ├── config.py         # 配置管理
        │   │
        │   ├── core/             # 核心业务逻辑
        │   │   ├── __init__.py
        │   │   ├── models/       # 数据模型
        │   │   ├── services/     # 业务服务
        │   │   └── utils/        # 工具函数
        │   │
        │   ├── api/              # API接口层
        │   │   ├── __init__.py
        │   │   ├── v1/           # 版本1
        │   │   └── dependencies.py
        │   │
        │   ├── data/             # 数据处理
        │   │   ├── __init__.py
        │   │   ├── repository/   # 数据访问层
        │   │   └── migrations/   # 数据库迁移
        │   │
        │   └── external/         # 外部服务
        │       ├── __init__.py
        │       ├── clients/      # API客户端
        │       └── integrations/ # 集成服务
        │
        ├── logs/                  # 日志目录（不提交到Git）
        │   ├── app.log
        │   └── error.log
        │
        └── data/                  # 数据目录（不提交到Git）
            ├── raw/               # 原始数据
            ├── processed/         # 处理后的数据
            └── cache/             # 缓存
        ```

        **使用场景**：Flask/FastAPI Web应用、RESTful API服务、Web后端

        ---

